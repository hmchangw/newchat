name: message-gatekeeper

services:
  message-gatekeeper:
    build:
      context: ../..
      dockerfile: message-gatekeeper/deploy/Dockerfile
    environment:
      - NATS_URL=nats://nats:4222
      - NATS_CREDS_FILE=/etc/nats/backend.creds
      - SITE_ID=site-local
      # Dev-only pprof profiling on the health port (off by default). Flip on
      # stack-wide for a profiling session with `PPROF_ENABLED=true make up`.
      - PPROF_ENABLED=${PPROF_ENABLED:-false}
      - MONGO_URI=mongodb://mongodb:27017
      - MONGO_DB=chat
      - CHAT_BASE_URL=http://localhost:3000
      # User cache fronts users-collection lookups so the per-message sender
      # display-name composition stays off the hot Mongo path. In-process LRU
      # (the pkg/userstore.Cache shared with broadcast-worker + message-worker);
      # entries are tiny so per-pod memory stays in the low MB.
      - USER_CACHE_SIZE=10000
      - USER_CACHE_TTL=5m
      - VALKEY_ADDRS=valkey:6379
      - ROOM_META_L2_TTL=15m
      - BOOTSTRAP_STREAMS=true
      # Dev-only X-Debug verbose logging. DEBUG_LOG_PAYLOADS gates full
      # request/reply/consumed body capture (pair with the X-Debug-Payload header).
      - DEBUG_LOG_PAYLOADS=${DEBUG_LOG_PAYLOADS:-false}
      - DEBUG_LOG_RATE=${DEBUG_LOG_RATE:-50}
      # /metrics (cache_*_total hit/miss/error counters); scraped by the
      # observability Prometheus over the chat-local network. No host port
      # mapping — search-service already owns host :9090.
      - METRICS_ADDR=:9090
    volumes:
      - ../../docker-local/backend.creds:/etc/nats/backend.creds:ro
    networks:
      - chat-local

networks:
  chat-local:
    external: true
