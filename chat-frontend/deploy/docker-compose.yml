name: chat-frontend

services:
  chat-frontend:
    build:
      context: ../..
      dockerfile: chat-frontend/deploy/Dockerfile
    environment:
      PORTAL_URL: ${PORTAL_URL:-http://localhost:8085}
      # OIDC values are only consumed when DEV_MODE=false. The Keycloak
      # realm at OIDC_ISSUER_URL must serve OIDC_CLIENT_ID with a redirect
      # URI matching this frontend's /oidc-callback.
      # Keep the local frontend aligned with auth-service's default. Set
      # DEV_MODE=false for both stacks when exercising the full OIDC flow.
      DEV_MODE: ${DEV_MODE:-true}
      OIDC_ISSUER_URL: ${OIDC_ISSUER_URL:-http://localhost:8180/realms/chatapp}
      OIDC_CLIENT_ID: ${OIDC_CLIENT_ID:-nats-chat}
      OTEL_ENABLED: ${OTEL_ENABLED:-true}
      OTEL_EXPORTER_OTLP_TRACES_URL: ${OTEL_EXPORTER_OTLP_TRACES_URL:-http://localhost:4318/v1/traces}
      OTEL_SERVICE_NAME: ${OTEL_SERVICE_NAME:-chat-frontend}
      OTEL_SERVICE_VERSION: ${OTEL_SERVICE_VERSION:-0.0.1}
      OTEL_DEPLOYMENT_ENVIRONMENT: ${OTEL_DEPLOYMENT_ENVIRONMENT:-local}
      # Mirrors portal-service's BOT_LOGIN_ENABLED; keep the two in sync when
      # exercising the disabled-flag path locally.
      BOT_LOGIN_ENABLED: ${BOT_LOGIN_ENABLED:-true}
    ports:
      - "3000:80"
    networks:
      - chat-local

networks:
  chat-local:
    external: true
