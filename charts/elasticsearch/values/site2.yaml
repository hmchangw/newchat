# Phase 2 prod — site2 (mirror of site1.yaml; manageCASecret=false).
properties:
  site: site2
  stage: PROD
  division: site2              # → ES cluster name: es-chat-site2
  publicDomain: chat.com

ccs:
  enabled: true
  # Bidirectional mesh — site2 registers all 11 other sites.
  peers: [site1, site3, site4, site5, site6, site7, site8, site9, site10, site11, site12]
  mode: public                 # cross-K8s via es-remote-<peer>.chat.com:443
  registrationJob:
    enabled: true              # post-install Job runs PUT /_cluster/settings for every peer
  transport:
    enabled: true
    caSecretName: chat-transport-ca
    manageCASecret: false      # site1 owns the shared CA Secret in this ns
  publicEndpoint:
    enabled: true

cluster:
  istioConfig:
    sidecar.istio.io/inject: "true"
    traffic.sidecar.istio.io/excludeInboundPorts: "9200,9300"
    traffic.sidecar.istio.io/excludeOutboundPorts: "9300"
