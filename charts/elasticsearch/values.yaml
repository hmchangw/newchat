# ──────────────────────────────────────────────────────────────────────────────
# Per-site properties — typically the only block you override per environment.
# ──────────────────────────────────────────────────────────────────────────────
properties:
  site: site1                  # logical site identifier (site1..site12)
  stage: PROD                  # PROD | STAGING | DEV (used by chat.gateway helper)
  division: chat               # appended to cluster.name → e.g. es-chat-chat
  publicDomain: chat.com       # used to build external hostnames

# ──────────────────────────────────────────────────────────────────────────────
# App toggles — disable parts of the chart per environment.
# ──────────────────────────────────────────────────────────────────────────────
enableApps:
  elasticsearch: true
  kibana: true
  gateway: true                # Istio Gateway resources
  virtualService: true         # Istio VirtualService resources
  authorizationPolicy: true    # Istio AuthorizationPolicy
  vaultSecrets: true           # VaultStaticSecret resources for elastic + MinIO

# ──────────────────────────────────────────────────────────────────────────────
# Cross-Cluster Search.
#
# Uses the TLS-CERT-based CCS model (Basic-tier, all ECK 2.x versions). The
# API-key model + remote_cluster_server listener (port 9443) is intentionally
# NOT used because both are paid-tier features — see the design doc license
# audit (`docs/superpowers/specs/2026-05-04-elasticsearch-ccs-mesh-design.md`
# §10) for empirical evidence.
#
#   ccs.enabled              master toggle. Cosmetic in cert-based mode (the
#                            wire-level CCS settings are written via a
#                            post-install Job / register-remotes script);
#                            kept for forward compatibility with future Helm
#                            templates that may render a registration Job
#                            from values.peers.
#
#   ccs.peers                List of peer site identifiers (e.g. [site2, site3]).
#                            When non-empty AND ccs.registrationJob.enabled,
#                            renders a post-install/upgrade Job that calls
#                            PUT /_cluster/settings to register every peer.
#                            Idempotent — safe to re-run on every helm upgrade.
#                            Leave empty if you prefer running register-remotes.sh
#                            manually instead.
#
#   ccs.mode                 internal | public — drives how the Job builds
#                            cluster.remote.<peer>.proxy_address:
#                              internal → <peer>-es-transport.<ns>.svc:9300
#                                         (same-K8s, Phase 1)
#                              public   → es-remote-<peer>.<publicDomain>:443
#                                         (cross-K8s, Phase 2)
#
#   ccs.registrationJob      Tunables for the Job. Set enabled=false to skip
#                            rendering it (e.g. if you prefer the script-based
#                            workflow for ad-hoc ops).
#
#   ccs.transport            Shared transport CA wiring. When enabled, every
#                            cluster references caSecretName so ECK signs
#                            node transport certs from a common root and
#                            clusters mutually trust each other automatically.
#
#   ccs.publicEndpoint       Phase 2 / cross-K8s only. Renders:
#                              - subjectAltNames on spec.transport.tls so
#                                cross-K8s peers can validate against the
#                                public hostname
#                              - chat-es-remote-<site>-gateway (Istio passthrough)
#                              - chat-es-remote-<site>-vs (SNI route to 9300)
#                            Leave disabled for Phase 1 — peers live in the
#                            same K8s and use the in-cluster transport Service.
# ──────────────────────────────────────────────────────────────────────────────
ccs:
  enabled: false

  peers: []
  # Phase 1 example (same K8s):  peers: [site2]
  # Phase 2 example (cross K8s): peers: [site2, site3, site4, site5, site6,
  #                                       site7, site8, site9, site10, site11, site12]

  mode: internal

  registrationJob:
    enabled: true
    image: curlimages/curl:8.10.0
    backoffLimit: 6
    healthTimeoutSeconds: 600
    publicPort: "443"          # override to "30443" for multi-kind harness

  transport:
    enabled: false
    # Name of the K8s Secret containing the shared transport CA cert+key
    # (kind: tls). Every site references the same Secret name so node certs
    # all chain to one root.
    caSecretName: chat-transport-ca
    # Whether THIS chart release manages the VaultStaticSecret that produces
    # the shared CA. The Secret itself is shared across every release in the
    # namespace, so exactly ONE release should own it (else Helm refuses the
    # second install). Convention: site1's release sets this true, all others
    # set false.
    manageCASecret: false

  publicEndpoint:
    enabled: false

# ──────────────────────────────────────────────────────────────────────────────
# Container images. Final image string is composed as
#   "<imageRegistry>/<image>:<cluster.version>"
# so cluster.version drives both the ECK resource spec.version field and the
# image tag — single source of truth, no risk of drift between the two.
# ──────────────────────────────────────────────────────────────────────────────
imageRegistry: docker.io/library
images:
  elasticSearch: elasticsearch
  kibana: kibana

# ──────────────────────────────────────────────────────────────────────────────
# Elasticsearch cluster.
# ──────────────────────────────────────────────────────────────────────────────
cluster:
  name: es-chat
  namespace: chat
  version: 8.19.8

  # Optional pass-throughs to the Elasticsearch CRD.
  auth: {}
  monitoring: {}

  # Annotations merged into every nodeSet's podTemplate.metadata.annotations.
  istioConfig: {}
  # Example:
  #   sidecar.istio.io/inject: "true"
  #   traffic.sidecar.istio.io/excludeInboundPorts: "9300"

  # ────────────────────────────────────────────────────────────────────────────
  # NodeSets — defaults sized to fit a MacBook kind cluster (3 master + 1 data
  # + 3 coord = 7 pods per cluster, 14 across two clusters). Override
  # per-environment via values files (storageClassName, count, storageSize)
  # for prod-grade deployments.
  #
  # remote_cluster_client is on every node so any node can coordinate a CCS query.
  # In cert-based CCS we don't enable remote_cluster_server (paid feature).
  # ────────────────────────────────────────────────────────────────────────────
  nodeSets:
    masters:
    - name: master-a
      count: 1
      nodeZone: zone1
      roles: [master, remote_cluster_client]
      storageSize: 128Mi         # masters only hold cluster metadata
      storageClassName: standard
    - name: master-b
      count: 1
      nodeZone: zone2
      roles: [master, remote_cluster_client]
      storageSize: 128Mi
      storageClassName: standard
    - name: master-c
      count: 1
      nodeZone: zone3
      roles: [master, remote_cluster_client]
      storageSize: 128Mi
      storageClassName: standard

    datas:
    - name: data-a
      count: 1
      nodeZone: zone1
      roles: [data, remote_cluster_client]
      storageSize: 512Mi         # only data nodes hold actual indices
      storageClassName: standard

    coordinators:
    - name: coords-a
      count: 1
      nodeZone: zone1
      roles: [remote_cluster_client]
      storageSize: 128Mi         # coords are stateless aside from local config
      storageClassName: standard
    - name: coords-b
      count: 1
      nodeZone: zone2
      roles: [remote_cluster_client]
      storageSize: 128Mi
      storageClassName: standard
    - name: coords-c
      count: 1
      nodeZone: zone3
      roles: [remote_cluster_client]
      storageSize: 128Mi
      storageClassName: standard

    # Free-form extra nodeSets (e.g. ml, ingest). Each entry mirrors the
    # masters/datas shape and uses additionalNodeResources.
    additionalNodes: []

  # ────────────────────────────────────────────────────────────────────────────
  # Per-role pod resources.
  #
  # Sizing convention used here (kind-friendly defaults):
  #   - JVM heap = requests.memory (set via -Xms / -Xmx, both equal)
  #   - container limit = 2× heap, leaving headroom for off-heap (Lucene mmap,
  #     direct buffers, thread stacks). With 256Mi heap + 512Mi limit the pod
  #     can serve test traffic without OOMKill.
  #   - CPU: 200m request / 500m limit — burst-friendly without reserving
  #     much capacity from kubelet.
  # Override per-role in prod values files for serious workloads.
  # ────────────────────────────────────────────────────────────────────────────
  masterNodeResources:
    esJavaOpts: "-Xms256m -Xmx256m"
    requests:
      memory: 256Mi
      cpu: 200m
    limits:
      memory: 1Gi               # ES off-heap (Lucene mmap + JVM overhead) needs ~2x heap; 512Mi limit OOMs under load
      cpu: 500m
  dataNodeResources:
    esJavaOpts: "-Xms256m -Xmx256m"
    requests:
      memory: 256Mi
      cpu: 200m
    limits:
      memory: 1Gi               # ES off-heap (Lucene mmap + JVM overhead) needs ~2x heap; 512Mi limit OOMs under load
      cpu: 500m
  coordNodeResources:
    esJavaOpts: "-Xms256m -Xmx256m"
    requests:
      memory: 256Mi
      cpu: 200m
    limits:
      memory: 1Gi               # ES off-heap (Lucene mmap + JVM overhead) needs ~2x heap; 512Mi limit OOMs under load
      cpu: 500m
  additionalNodeResources:
    esJavaOpts: "-Xms256m -Xmx256m"
    requests:
      memory: 256Mi
      cpu: 200m
    limits:
      memory: 1Gi               # ES off-heap (Lucene mmap + JVM overhead) needs ~2x heap; 512Mi limit OOMs under load
      cpu: 500m

# ──────────────────────────────────────────────────────────────────────────────
# Kibana — single-instance per site, fronted by the same Istio passthrough pattern.
# Version always tracks cluster.version (no separate Kibana version override).
# ──────────────────────────────────────────────────────────────────────────────
kibana:
  name: kibana-chat
  count: 1
  resources:
    requests:
      memory: 256Mi
      cpu: 200m
    limits:
      memory: 1Gi               # ES off-heap (Lucene mmap + JVM overhead) needs ~2x heap; 512Mi limit OOMs under load
      cpu: 500m

# ──────────────────────────────────────────────────────────────────────────────
# Public hostnames. Leave blank to auto-derive from properties.site / publicDomain:
#   esHttp:    es-<site>.<publicDomain>
#   kibana:    kibana-<site>.<publicDomain>
#   esRemote:  es-remote-<site>.<publicDomain>
# ──────────────────────────────────────────────────────────────────────────────
hosts:
  esHttp: ""
  kibana: ""
  esRemote: ""

# ──────────────────────────────────────────────────────────────────────────────
# Istio.
# ──────────────────────────────────────────────────────────────────────────────
istio:
  # Selector for the shared ingressgateway pod that the per-app gateways attach to.
  gatewaySelector:
    istio: chat-ingressgateway

# ──────────────────────────────────────────────────────────────────────────────
# AuthorizationPolicy — restricts inbound by source CIDR + dst port.
# Scoped to ES + Kibana pods via workloadSelector so it does NOT apply to the
# per-namespace Istio ingressgateway pod (which listens on 443 and would
# otherwise be blocked by an unmatched port).
# ──────────────────────────────────────────────────────────────────────────────
authorizationPolicy:
  name: ""                     # auto-derived when blank
  sourceCidrs:
  - 172.0.0.0/8
  ports:
  - "9200"
  - "5601"
  - "9300"                     # transport (CCS uses this in cert-based mode)

# ──────────────────────────────────────────────────────────────────────────────
# HashiCorp Vault Secrets Operator — pulls credentials from Vault into K8s Secrets
# that ECK then consumes (elastic-user override, MinIO snapshot credentials).
# ──────────────────────────────────────────────────────────────────────────────
vault:
  vaultAuthRef: default        # name of the VaultAuth resource
  vaultConnectionRef: ""       # optional VaultConnection ref
  mount: secret                # KV mount in Vault
  type: kv-v2                  # kv-v1 | kv-v2
  refreshAfter: 30s
  # Vault paths. Leave blank to default to elasticsearch/<site>/<purpose>
  # (or elasticsearch/<purpose> for shared paths like the transport CA).
  paths:
    elasticUser: ""            # → elasticsearch/<site>/elastic-user
    minio: ""                  # → elasticsearch/<site>/minio
    transportCA: ""            # → elasticsearch/transport-ca (shared across all sites)
