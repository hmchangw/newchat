{{- if .Values.enableApps.vaultSecrets }}
{{- /*
   Pre-creates the `<es-name>-es-elastic-user` Secret with the password from
   Vault. ECK detects an existing Secret of this exact name and uses it
   instead of generating its own — effectively overriding the default
   `elastic` superuser password with one we control.

   Vault path layout (KV v2):
     <mount>/<vault.paths.elasticUser>
       elastic: <password>

   ECK contract: the Secret must contain the key `elastic` whose value is the
   plaintext password.
*/}}
apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultStaticSecret
metadata:
  name: {{ include "chat.es.fullname" . }}-es-elastic-user
  namespace: {{ .Values.cluster.namespace }}
spec:
  type: {{ .Values.vault.type }}
  mount: {{ .Values.vault.mount }}
  path: {{ include "chat.vault.path.elasticUser" . }}
  refreshAfter: {{ .Values.vault.refreshAfter }}
  vaultAuthRef: {{ .Values.vault.vaultAuthRef }}
  {{- with .Values.vault.vaultConnectionRef }}
  vaultConnectionRef: {{ . }}
  {{- end }}
  destination:
    name: {{ include "chat.es.fullname" . }}-es-elastic-user
    create: true
    overwrite: true
{{- end }}
