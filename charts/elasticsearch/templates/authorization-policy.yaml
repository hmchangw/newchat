{{- if .Values.enableApps.authorizationPolicy }}
{{- /*
   Restricts inbound traffic to allowed source CIDRs (typically the K8s pod
   network) and allowed destination ports. The Istio ingressgateway pod sits
   inside the pod CIDR, so external traffic via the gateway also matches.
   Authentication is handled at the ES layer (native realm + cross-cluster
   API keys), not here.
*/}}
{{- $ports := .Values.authorizationPolicy.ports }}
{{- if .Values.ccs.enabled }}
{{- $ports = append $ports "9443" }}
{{- end }}
apiVersion: security.istio.io/v1
kind: AuthorizationPolicy
metadata:
  name: {{ default (printf "chat-es-%s-authz" .Values.properties.site) .Values.authorizationPolicy.name }}
  namespace: {{ .Values.cluster.namespace }}
spec:
  action: ALLOW
  rules:
  - from:
    - source:
        ipBlocks:
          {{- toYaml .Values.authorizationPolicy.sourceCidrs | nindent 8 }}
    to:
    - operation:
        ports:
          {{- toYaml $ports | nindent 8 }}
{{- end }}
