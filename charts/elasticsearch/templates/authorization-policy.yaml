{{- if .Values.enableApps.authorizationPolicy }}
{{- /*
   Restricts inbound traffic to allowed source CIDRs (typically the K8s pod
   network) and allowed destination ports. Scoped via workloadSelector to ES
   + Kibana pods only — the per-namespace Istio ingressgateway pod listens on
   443, which is intentionally NOT in the allowed list. Without the selector
   this policy would block the gateway pod and break ingress entirely.
   Authentication is handled at the ES layer (native realm), not here.
*/}}
apiVersion: security.istio.io/v1
kind: AuthorizationPolicy
metadata:
  name: {{ default (printf "chat-es-%s-authz" .Values.properties.site) .Values.authorizationPolicy.name }}
  namespace: {{ .Values.cluster.namespace }}
spec:
  selector:
    matchLabels:
      common.k8s.elastic.co/type: elasticsearch
  action: ALLOW
  rules:
  - from:
    - source:
        ipBlocks:
          {{- toYaml .Values.authorizationPolicy.sourceCidrs | nindent 8 }}
    to:
    - operation:
        ports:
          {{- toYaml .Values.authorizationPolicy.ports | nindent 8 }}
---
apiVersion: security.istio.io/v1
kind: AuthorizationPolicy
metadata:
  name: {{ default (printf "chat-kibana-%s-authz" .Values.properties.site) "" }}
  namespace: {{ .Values.cluster.namespace }}
spec:
  selector:
    matchLabels:
      common.k8s.elastic.co/type: kibana
  action: ALLOW
  rules:
  - from:
    - source:
        ipBlocks:
          {{- toYaml .Values.authorizationPolicy.sourceCidrs | nindent 8 }}
    to:
    - operation:
        ports: ["5601"]
{{- end }}
