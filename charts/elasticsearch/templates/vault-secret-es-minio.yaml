{{- if .Values.enableApps.vaultSecrets }}
{{- /*
   Provides MinIO credentials for the ES snapshot/restore S3 client. ECK reads
   this Secret via spec.secureSettings (see es-cluster.yaml) and mounts the
   entries into each node's keystore as:
     s3.client.default.access_key
     s3.client.default.secret_key

   Vault path layout (KV v2):
     <mount>/<vault.paths.minio>
       MINIO_BUCKET_ACCESS_KEY: <key>
       MINIO_BUCKET_SECRET_KEY: <secret>
*/}}
apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultStaticSecret
metadata:
  name: {{ include "chat.es.fullname" . }}-es-minio
  namespace: {{ .Values.cluster.namespace }}
spec:
  type: {{ .Values.vault.type }}
  mount: {{ .Values.vault.mount }}
  path: {{ include "chat.vault.path.minio" . }}
  refreshAfter: {{ .Values.vault.refreshAfter }}
  vaultAuthRef: {{ .Values.vault.vaultAuthRef }}
  {{- with .Values.vault.vaultConnectionRef }}
  vaultConnectionRef: {{ . }}
  {{- end }}
  destination:
    name: {{ include "chat.es.fullname" . }}-es-minio
    create: true
    overwrite: true
{{- end }}
