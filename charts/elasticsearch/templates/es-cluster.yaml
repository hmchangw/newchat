{{- if .Values.enableApps.elasticsearch }}
apiVersion: elasticsearch.k8s.elastic.co/v1
kind: Elasticsearch
metadata:
  name: {{ include "chat.es.fullname" . }}
  namespace: {{ .Values.cluster.namespace }}
spec:
  version: {{ required "An Elasticsearch version is required" .Values.cluster.version }}
  {{- with .Values.auth }}
  auth:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  {{- with .Values.monitoring }}
  monitoring:
    {{- toYaml . | nindent 4 }}
  {{- end }}

  secureSettings:
  - secretName: {{ include "chat.es.fullname" . }}-es-minio
    entries:
    - key: MINIO_BUCKET_ACCESS_KEY
      path: s3.client.default.access_key
    - key: MINIO_BUCKET_SECRET_KEY
      path: s3.client.default.secret_key

  {{- /*
     Cert-based CCS: every cluster references the SAME shared transport CA
     Secret, so node transport certs across all clusters chain to one root and
     mutually trust. In Phase 2, subjectAltNames also include the public host
     so cross-K8s peers can validate against `cluster.remote.<peer>.server_name`.
  */}}
  {{- if .Values.ccs.transport.enabled }}
  transport:
    tls:
      certificate:
        secretName: {{ required "ccs.transport.caSecretName must be set when ccs.transport.enabled" .Values.ccs.transport.caSecretName }}
      {{- if .Values.ccs.publicEndpoint.enabled }}
      subjectAltNames:
      - dns: {{ include "chat.hosts.esRemote" . }}
      - dns: {{ include "chat.es.fullname" . }}-es-transport.{{ .Values.cluster.namespace }}.svc.cluster.local
      {{- end }}
  {{- end }}

  {{- $ctx := . }}
  {{- $img := printf "%s/%s:%s" .Values.imageRegistry .Values.images.elasticSearch .Values.cluster.version }}
  {{- $masters := .Values.cluster.nodeSets.masters }}
  {{- $datas := .Values.cluster.nodeSets.datas }}
  {{- $coords := .Values.cluster.nodeSets.coordinators }}
  {{- $additionals := .Values.cluster.nodeSets.additionalNodes }}

  nodeSets:
    {{- /* ───────────────────────── masters ───────────────────────── */}}
    {{- range $masters }}
    - name: {{ .name }}
      {{- include "config-per-node" (dict "Count" .count "NodeZone" .nodeZone "NodeRoles" .roles) | nindent 6 }}
      podTemplate:
        metadata:
          {{- with $ctx.Values.cluster.istioConfig }}
          annotations:
            {{- toYaml . | nindent 12 }}
          {{- end }}
        spec:
          {{- include "node-resource-config" (dict
              "ESJavaOpts" $ctx.Values.cluster.masterNodeResources.esJavaOpts
              "RequestsMemory" $ctx.Values.cluster.masterNodeResources.requests.memory
              "RequestsCpu" $ctx.Values.cluster.masterNodeResources.requests.cpu
              "LimitsMemory" $ctx.Values.cluster.masterNodeResources.limits.memory
              "LimitsCpu" $ctx.Values.cluster.masterNodeResources.limits.cpu
              "ClusterImage" $img) | nindent 10 }}
      {{- include "pvc-config" (dict "StorageSize" .storageSize "StorageClassName" .storageClassName) | nindent 6 }}
    {{- end }}

    {{- /* ───────────────────────── datas ───────────────────────── */}}
    {{- range $datas }}
    - name: {{ .name }}
      {{- include "config-per-node" (dict "Count" .count "NodeZone" .nodeZone "NodeRoles" .roles) | nindent 6 }}
      podTemplate:
        metadata:
          {{- with $ctx.Values.cluster.istioConfig }}
          annotations:
            {{- toYaml . | nindent 12 }}
          {{- end }}
        spec:
          {{- include "node-resource-config" (dict
              "ESJavaOpts" $ctx.Values.cluster.dataNodeResources.esJavaOpts
              "RequestsMemory" $ctx.Values.cluster.dataNodeResources.requests.memory
              "RequestsCpu" $ctx.Values.cluster.dataNodeResources.requests.cpu
              "LimitsMemory" $ctx.Values.cluster.dataNodeResources.limits.memory
              "LimitsCpu" $ctx.Values.cluster.dataNodeResources.limits.cpu
              "ClusterImage" $img) | nindent 10 }}
      {{- include "pvc-config" (dict "StorageSize" .storageSize "StorageClassName" .storageClassName) | nindent 6 }}
    {{- end }}

    {{- /* ───────────────────────── coordinators ─────────────────────────
         Coord-only nodes get remote_cluster_server.enabled when ccs.enabled.
         This is the only nodeSet group whose config diverges from the others.
    */}}
    {{- range $coords }}
    - name: {{ .name }}
      {{- /*
         Cert-based CCS uses the standard transport listener (9300), so no
         `remote_cluster_server.enabled` or 9443 SSL injection is needed —
         that path is API-key/Enterprise-gated. See design doc Section 4.1.
      */}}
      {{- include "config-per-node" (dict "Count" .count "NodeZone" .nodeZone "NodeRoles" .roles) | nindent 6 }}
      podTemplate:
        metadata:
          {{- with $ctx.Values.cluster.istioConfig }}
          annotations:
            {{- toYaml . | nindent 12 }}
          {{- end }}
        spec:
          {{- include "node-resource-config" (dict
              "ESJavaOpts" $ctx.Values.cluster.coordNodeResources.esJavaOpts
              "RequestsMemory" $ctx.Values.cluster.coordNodeResources.requests.memory
              "RequestsCpu" $ctx.Values.cluster.coordNodeResources.requests.cpu
              "LimitsMemory" $ctx.Values.cluster.coordNodeResources.limits.memory
              "LimitsCpu" $ctx.Values.cluster.coordNodeResources.limits.cpu
              "ClusterImage" $img) | nindent 10 }}
      {{- include "pvc-config" (dict "StorageSize" .storageSize "StorageClassName" .storageClassName) | nindent 6 }}
    {{- end }}

    {{- /* ───────────────────────── additionalNodes ───────────────────────── */}}
    {{- range $additionals }}
    - name: {{ .name }}
      {{- include "config-per-node" (dict "Count" .count "NodeZone" .nodeZone "NodeRoles" .roles) | nindent 6 }}
      podTemplate:
        metadata:
          {{- with $ctx.Values.cluster.istioConfig }}
          annotations:
            {{- toYaml . | nindent 12 }}
          {{- end }}
        spec:
          {{- include "node-resource-config" (dict
              "ESJavaOpts" $ctx.Values.cluster.additionalNodeResources.esJavaOpts
              "RequestsMemory" $ctx.Values.cluster.additionalNodeResources.requests.memory
              "RequestsCpu" $ctx.Values.cluster.additionalNodeResources.requests.cpu
              "LimitsMemory" $ctx.Values.cluster.additionalNodeResources.limits.memory
              "LimitsCpu" $ctx.Values.cluster.additionalNodeResources.limits.cpu
              "ClusterImage" $img) | nindent 10 }}
      {{- include "pvc-config" (dict "StorageSize" .storageSize "StorageClassName" .storageClassName) | nindent 6 }}
    {{- end }}
{{- end }}
