{{- /*
   The transport-CA VaultStaticSecret is *shared* across every cluster in
   the namespace — only ONE release should manage it (otherwise Helm refuses
   the second release with "exists and cannot be imported"). Gate on
   ccs.transport.manageCASecret so a single per-namespace release renders it
   and all peers consume the resulting K8s Secret.
*/ -}}
{{- if and .Values.enableApps.vaultSecrets .Values.ccs.transport.enabled .Values.ccs.transport.manageCASecret }}
{{- /*
   Pulls the SHARED transport CA cert+key from Vault into a K8s Secret.
   Every cluster (Phase 1: 2; Phase 2: 12) reads from the same Vault path
   and ends up with the same cert+key materialised under
   .Values.ccs.transport.caSecretName, which spec.transport.tls.certificate
   references. Result: ECK signs every node transport cert from a common
   root, so all clusters mutually trust automatically.

   Vault path layout (KV v2):
     <mount>/<vault.paths.transportCA>
       tls.crt: <PEM CA cert>
       tls.key: <PEM CA key>

   ECK contract: the Secret must contain `tls.crt` and `tls.key`. ECK uses
   them as a CA and signs each node's transport cert from this root.
*/}}
apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultStaticSecret
metadata:
  name: {{ .Values.ccs.transport.caSecretName }}
  namespace: {{ .Values.cluster.namespace }}
spec:
  type: {{ .Values.vault.type }}
  mount: {{ .Values.vault.mount }}
  path: {{ include "chat.vault.path.transportCA" . }}
  refreshAfter: {{ .Values.vault.refreshAfter }}
  vaultAuthRef: {{ .Values.vault.vaultAuthRef }}
  {{- with .Values.vault.vaultConnectionRef }}
  vaultConnectionRef: {{ . }}
  {{- end }}
  destination:
    name: {{ .Values.ccs.transport.caSecretName }}
    create: true
    overwrite: true
    type: kubernetes.io/tls
{{- end }}
