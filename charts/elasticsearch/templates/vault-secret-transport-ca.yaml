{{- /*
   Pulls this cluster's copy of the SHARED transport CA cert+key from Vault
   into a local K8s Secret. Every cluster reads the SAME Vault path
   (vault.paths.transportCA) and materialises identical cert+key bytes under a
   per-cluster Secret name (chat.transport.caSecretName, default
   <es-fullname>-transport-ca), which spec.transport.tls.certificate
   references. Result: ECK signs every node transport cert from a common root,
   so all clusters mutually trust automatically.

   No "manageCASecret" gate is needed: the per-cluster Secret name is unique,
   so two releases in one namespace never collide. Each cluster simply owns
   its own copy. (Cross-K8s, each cluster MUST own its own copy anyway, since
   K8s Secrets don't cross cluster boundaries.)

   Vault path layout (KV v2):
     <mount>/<vault.paths.transportCA>
       tls.crt: <PEM CA cert>
       tls.key: <PEM CA key>

   ECK contract: the Secret must contain `tls.crt` AND `tls.key`. ECK uses
   them as a CA and signs each node's transport cert from this root. Without
   the key, ECK silently falls back to its own self-signed CA → no trust.
*/ -}}
{{- if and .Values.enableApps.vaultSecrets .Values.ccs.transport.enabled }}
apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultStaticSecret
metadata:
  name: {{ include "chat.transport.caSecretName" . }}
  namespace: {{ .Values.cluster.namespace }}
spec:
  type: {{ .Values.vault.type }}
  mount: {{ .Values.vault.mount }}
  path: {{ include "chat.vault.path.transportCA" . }}
  refreshAfter: {{ .Values.vault.refreshAfter }}
  vaultAuthRef: {{ .Values.vault.vaultAuthRef }}
  {{- with .Values.vault.vaultConnectionRef }}
  vaultConnectionRef: {{ . }}
  {{- end }}
  destination:
    name: {{ include "chat.transport.caSecretName" . }}
    create: true
    overwrite: true
    type: kubernetes.io/tls
{{- end }}
