# Single-node kind cluster sized for a MacBook running 2 minimal ES clusters
# + Istio + ECK operator + Vault + VSO in the same namespace.
#
# extraPortMappings expose the per-namespace Istio ingressgateway to the host:
#   localhost:80   → chat ingressgateway HTTP
#   localhost:443  → chat ingressgateway HTTPS (TLS PASSTHROUGH per chart)
# So you can `curl https://es-site1.chat.com` after editing /etc/hosts.
kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: chat-eck
nodes:
- role: control-plane
  kubeadmConfigPatches:
  - |
    kind: InitConfiguration
    nodeRegistration:
      kubeletExtraArgs:
        node-labels: "ingress-ready=true"
  extraPortMappings:
  - containerPort: 30080
    hostPort: 80
    protocol: TCP
  - containerPort: 30443
    hostPort: 443
    protocol: TCP
