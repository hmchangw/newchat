# VSO connection + auth resources used by the chart's VaultStaticSecret
# resources (vault-secret-elastic-user.yaml). The Helm values reference these
# via vault.vaultConnectionRef / vault.vaultAuthRef.
#
# Vault is installed in `vault` namespace by setup.sh in dev mode (root token
# `root`, kubernetes auth method enabled, role `chat-app` mapped to the
# `default` ServiceAccount in the `chat` namespace, KV v2 mount `secret`).
apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultConnection
metadata:
  name: chat-vault-connection
  namespace: chat
spec:
  address: http://vault.vault.svc.cluster.local:8200
  skipTLSVerify: true
---
apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultAuth
metadata:
  name: chat-vault-auth
  namespace: chat
spec:
  vaultConnectionRef: chat-vault-connection
  method: kubernetes
  mount: kubernetes
  kubernetes:
    role: chat-app
    serviceAccount: default
    audiences:
    - vault
