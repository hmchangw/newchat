# Values for the upstream hashicorp/vault-secrets-operator chart.
# Bridges Vault → K8s Secrets so ECK can consume Vault-backed credentials
# (the chart's VaultStaticSecret resources for elastic-user + minio).
controller:
  manager:
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 500m
        memory: 256Mi
  replicas: 1
