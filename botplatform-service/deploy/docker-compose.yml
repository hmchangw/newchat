name: botplatform-service

services:
  botplatform-service:
    build:
      context: ../..
      dockerfile: botplatform-service/deploy/Dockerfile
    pull_policy: build
    # No host port publish: traefik fronts this at :7777 (/api/v1/password/change)
    # and in-network callers reach it as botplatform-service:8080. Publishing host
    # 8080 collided with auth-service and media-service, which also default to 8080.
    environment:
      - PORT=8080
      - SITE_ID=site-local
      - MONGO_URI=mongodb://mongodb:27017
      - MONGO_DB=chat
      - SESSIONS_MAX_PER_ACCOUNT=100
      - BCRYPT_COST=10
      - DEV_MODE=true
    networks:
      - chat-local

networks:
  chat-local:
    external: true
