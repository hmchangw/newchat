name: message-worker

services:
  vault:
    image: hashicorp/vault:1.18
    cap_add:
      - IPC_LOCK
    environment:
      - VAULT_DEV_ROOT_TOKEN_ID=dev-only-token
      - VAULT_DEV_LISTEN_ADDRESS=0.0.0.0:8200
    networks:
      - chat-local
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8200/v1/sys/health"]
      interval: 5s
      timeout: 3s
      retries: 10

  vault-bootstrap:
    image: hashicorp/vault:1.18
    depends_on:
      vault:
        condition: service_healthy
    environment:
      - VAULT_ADDR=http://vault:8200
      - VAULT_TOKEN=dev-only-token
    entrypoint:
      - /bin/sh
      - -c
      - |
        set -e
        vault secrets enable -path=transit transit || true
        vault write -f transit/keys/chat-kek
    networks:
      - chat-local

  message-worker:
    build:
      context: ../..
      dockerfile: message-worker/deploy/Dockerfile
    pull_policy: build
    depends_on:
      vault-bootstrap:
        condition: service_completed_successfully
    environment:
      - NATS_URL=nats://nats:4222
      - NATS_CREDS_FILE=/etc/nats/backend.creds
      - SITE_ID=site-local
      - CASSANDRA_HOSTS=cassandra
      - CASSANDRA_KEYSPACE=chat
      - MONGO_URI=mongodb://mongodb:27017
      - MONGO_DB=chat
      # In-process user cache (pkg/userstore.Cache, shared with message-gatekeeper
      # and broadcast-worker). Defaults: 10000 entries, 5m TTL.
      - USER_CACHE_SIZE=10000
      - USER_CACHE_TTL=5m
      - BOOTSTRAP_STREAMS=true
      - ATREST_ENABLED=true
      - VAULT_ADDR=http://vault:8200
      - VAULT_TOKEN=dev-only-token
      - ATREST_VAULT_TRANSIT_KEY=chat-kek
    volumes:
      - ../../docker-local/backend.creds:/etc/nats/backend.creds:ro
    networks:
      - chat-local

networks:
  chat-local:
    external: true
