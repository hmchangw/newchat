# Prometheus — scrapes the SDK metrics endpoint (:2112) off every chat container
# on the chat-local network via Docker service discovery, so any service that
# comes up is picked up automatically (no static target list to maintain).
#
# Non-service containers (mongo, nats, …) that don't expose :2112 show up as
# `down` targets — harmless local noise. To limit scraping to real services,
# give them a `chat.metrics=true` compose label and tighten the keep rule below.
global:
  scrape_interval: 15s

scrape_configs:
  - job_name: chat-services
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        port: 2112
    relabel_configs:
      # Only containers attached to the chat-local network.
      - source_labels: [__meta_docker_network_name]
        regex: chat-local
        action: keep
      # Use the container name as the Prometheus `instance`.
      - source_labels: [__meta_docker_container_name]
        regex: /?(.*)
        target_label: instance
      - source_labels: [__meta_docker_container_label_com_docker_compose_service]
        target_label: service

  - job_name: otel-collector
    static_configs:
      - targets: ["otel-collector:8888"]
