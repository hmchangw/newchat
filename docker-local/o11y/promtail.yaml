# promtail — tails container stdout (where every service writes its o11y JSON
# logs) off the Docker socket and ships to Loki. JSON parsing pulls out the
# trace/span/request ids so Grafana can pivot log ↔ trace.
server:
  http_listen_port: 9080
  log_level: warn

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: chat-containers
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 10s
    relabel_configs:
      - source_labels: [__meta_docker_network_name]
        regex: chat-local
        action: keep
      - source_labels: [__meta_docker_container_name]
        regex: /?(.*)
        target_label: container
      - source_labels: [__meta_docker_container_label_com_docker_compose_service]
        target_label: service
    pipeline_stages:
      # Service logs are JSON (slog). Extract the trace/request ids as labels so
      # Grafana's Loki↔Tempo correlation works; non-JSON lines pass through.
      - json:
          expressions:
            level: level
            trace_id: trace_id
            request_id: request_id
      - labels:
          level:
