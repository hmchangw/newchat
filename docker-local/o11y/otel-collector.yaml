# OpenTelemetry Collector — local dev.
# Receives OTLP traces from every chat service (default
# OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4318) and forwards them to
# Tempo. Metrics are pulled by Prometheus directly off each service's :2112, and
# logs are tailed off container stdout by promtail — neither flows through here.
receivers:
  otlp:
    protocols:
      http:
        endpoint: 0.0.0.0:4318
      grpc:
        endpoint: 0.0.0.0:4317

processors:
  batch:
    timeout: 2s

exporters:
  otlp/tempo:
    endpoint: tempo:4317
    tls:
      insecure: true

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlp/tempo]
  telemetry:
    logs:
      level: warn
    metrics:
      address: 0.0.0.0:8888
