name: chat-local-services

# Aggregates every microservice's deploy/docker-compose.yml. Expects the shared
# third-party deps (NATS, MongoDB, Cassandra, Elasticsearch, Keycloak) to
# already be running on the chat-local network — start them via `make deps-up`.
#
# Start:  make up        (foreground, streams every service's logs)
# Stop:   make down

include:
  - ../admin-service/deploy/docker-compose.yml
  - ../auth-service/deploy/docker-compose.yml
  - ../botplatform-service/deploy/docker-compose.yml
  - ../broadcast-worker/deploy/user/docker-compose.yml
  - ../broadcast-worker/deploy/bot/docker-compose.yml
  - ../history-service/deploy/docker-compose.yml
  - ../inbox-worker/deploy/docker-compose.yml
  - ../media-service/deploy/docker-compose.yml
  - ../message-gatekeeper/deploy/docker-compose.yml
  - ../message-worker/deploy/docker-compose.yml
  - ../notification-worker/deploy/user/docker-compose.yml
  - ../notification-worker/deploy/bot/docker-compose.yml
  - ../outbox-worker/deploy/docker-compose.yml
  - ../portal-service/deploy/docker-compose.yml
  - ../push-service/deploy/user/docker-compose.yml
  - ../push-service/deploy/bot/docker-compose.yml
  - ../room-service/deploy/docker-compose.yml
  - ../room-worker/deploy/docker-compose.yml
  - ../search-service/deploy/docker-compose.yml
  - ../search-sync-worker/deploy/docker-compose.yml
  - ../tcard-service/deploy/docker-compose.yml
  - ../upload-service/deploy/docker-compose.yml
  - ../user-presence-service/deploy/docker-compose.yml
  - ../user-service/deploy/docker-compose.yml

x-local-o11y: &local-o11y
  environment:
    # The aggregate stack is an explicit local observability environment.
    # Individual service deployment Compose files intentionally omit this so
    # production stays zero-impact unless its deployment sets the master switch.
    O11Y_ENABLED: ${O11Y_ENABLED:-true}

services:
  admin-service: *local-o11y
  auth-service: *local-o11y
  botplatform-service: *local-o11y
  broadcast-worker: *local-o11y
  bot-broadcast-worker: *local-o11y
  history-service: *local-o11y
  inbox-worker: *local-o11y
  media-service: *local-o11y
  message-gatekeeper: *local-o11y
  message-worker: *local-o11y
  notification-worker: *local-o11y
  bot-notification-worker: *local-o11y
  outbox-worker: *local-o11y
  portal-service: *local-o11y
  push-service: *local-o11y
  bot-push-service: *local-o11y
  room-service: *local-o11y
  room-worker: *local-o11y
  search-service: *local-o11y
  search-sync-worker: *local-o11y
  upload-service: *local-o11y
  user-presence-service: *local-o11y
  user-service: *local-o11y

  # Unified `/api/v1` gateway (docker-local Task 5 of the unified-gateway
  # migration). Fronts auth/upload/media/botplatform on the single baseUrl
  # port :7777; routing is a static file (./traefik/dynamic.yml) rather than
  # Docker-label discovery, so the included services above need no
  # gateway-specific labels. Portal-service is NOT routed here — it keeps its
  # own direct port (8085); see traefik/dynamic.yml for why.
  traefik:
    image: traefik:3.6.4
    command:
      - --entrypoints.web.address=:7777
      - --ping=true
      - --ping.entrypoint=web
      - --providers.file.directory=/etc/traefik/dynamic
      - --providers.file.watch=true
    ports:
      - "7777:7777"
    volumes:
      - ./traefik/dynamic.yml:/etc/traefik/dynamic/dynamic.yml:ro
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:7777/ping"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s
    networks:
      - chat-local

networks:
  chat-local:
    external: true
