name: admin-service

services:
  admin-service:
    build:
      context: ../..
      dockerfile: admin-service/deploy/Dockerfile
    pull_policy: build
    ports:
      - "8082:8082"
    environment:
      - OTEL_SERVICE_NAME=admin-service
      - OTEL_EXPORTER_OTLP_ENDPOINT=${OTEL_EXPORTER_OTLP_ENDPOINT:-http://otel-collector:4318}
      - PORT=8082
      - SITE_ID=site-local
      - MONGO_URI=mongodb://mongodb:27017
      - MONGO_DB=chat
      - BCRYPT_COST=10
    networks:
      - chat-local

networks:
  chat-local:
    external: true
