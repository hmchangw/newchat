name: notification-worker

services:
  notification-worker:
    build:
      context: ../../..
      dockerfile: notification-worker/deploy/user/Dockerfile
    environment:
      - OTEL_SERVICE_NAME=notification-worker
      - OTEL_EXPORTER_OTLP_ENDPOINT=${OTEL_EXPORTER_OTLP_ENDPOINT:-http://otel-collector:4318}
      - NATS_URL=nats://nats:4222
      - NATS_CREDS_FILE=/etc/nats/backend.creds
      - SITE_ID=site-local
      # Canonical message pipeline this deployment consumes from, and the push
      # stream/subject it publishes to. The bot deployment (deploy/bot/) overrides
      # these to bind the same binary to the bot pipeline instead.
      - INPUT_STREAM=MESSAGES_CANONICAL_site-local
      - INPUT_SUBJECT_FILTER=chat.msg.canonical.site-local.created
      - OUTPUT_STREAM=PUSH_NOTIFICATION_site-local
      - OUTPUT_SUBJECT_PREFIX=chat.server.notification.push.site-local
      # Dev-only pprof profiling on the health port (off by default). Flip on
      # stack-wide for a profiling session with `PPROF_ENABLED=true make up`.
      - PPROF_ENABLED=${PPROF_ENABLED:-false}
      - MONGO_URI=mongodb://mongodb:27017
      - MONGO_DB=chat
      - VALKEY_ADDRS=valkey:6379
      - ROOMSUBCACHE_TTL=5m
      - LARGE_ROOM_THRESHOLD=500
      # Recipients per PUSH_NOTIFICATION event. Default 100; well under FCM's 500-token
      # multicast cap and APNs HTTP/2 connection-frame ceiling.
      - PUSH_RECIPIENT_BATCH_SIZE=100
      # Title is resolved here from the rooms collection; sender display name is
      # pre-composed by message-gatekeeper and propagated on the canonical message,
      # so no users-collection lookup runs in this service.
      - ROOM_META_CACHE_SIZE=10000
      - ROOM_META_CACHE_TTL=2m
      - PRESENCE_RPC_ENABLED=false
      # Must match the broker's max_payload. Emitter rejects batches larger
      # than this before publish so the failure surfaces with a clear error
      # instead of a NATS NACK.
      - NATS_MAX_PAYLOAD_BYTES=262144
      - BOOTSTRAP_STREAMS=true
    volumes:
      - ../../../docker-local/backend.creds:/etc/nats/backend.creds:ro
    networks:
      - chat-local

networks:
  chat-local:
    external: true
