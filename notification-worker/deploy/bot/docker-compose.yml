name: bot-notification-worker

services:
  bot-notification-worker:
    build:
      context: ../../..
      dockerfile: notification-worker/deploy/bot/Dockerfile
    environment:
      - OTEL_SERVICE_NAME=bot-notification-worker
      - OTEL_EXPORTER_OTLP_ENDPOINT=${OTEL_EXPORTER_OTLP_ENDPOINT:-http://otel-collector:4318}
      - NATS_URL=nats://nats:4222
      - NATS_CREDS_FILE=/etc/nats/backend.creds
      - SITE_ID=site-local
      # Bot-canonical pipeline (Task 8): same notification-worker binary as the
      # user deployment, bound to the bot streams/subjects instead via env.
      - INPUT_STREAM=BOT_MESSAGES_CANONICAL_site-local
      - INPUT_SUBJECT_FILTER=chat.bot.canonical.site-local.>
      - OUTPUT_STREAM=BOT_PUSH_NOTIF_site-local
      - OUTPUT_SUBJECT_PREFIX=chat.bot.notification.push.site-local
      - CONSUMER_NAME=bot-notification-worker
      # Dev-only pprof profiling on the health port (off by default). Flip on
      # stack-wide for a profiling session with `PPROF_ENABLED=true make up`.
      - PPROF_ENABLED=${PPROF_ENABLED:-false}
      - MONGO_URI=mongodb://mongodb:27017
      - MONGO_DB=chat
      - VALKEY_ADDRS=valkey:6379
      - ROOMSUBCACHE_TTL=5m
      - LARGE_ROOM_THRESHOLD=500
      # Recipients per BOT_PUSH_NOTIF event. Default 100; well under FCM's 500-token
      # multicast cap and APNs HTTP/2 connection-frame ceiling.
      - PUSH_RECIPIENT_BATCH_SIZE=100
      - ROOM_META_CACHE_SIZE=10000
      - ROOM_META_CACHE_TTL=2m
      - PRESENCE_RPC_ENABLED=false
      # Must match the broker's max_payload. Emitter rejects batches larger
      # than this before publish so the failure surfaces with a clear error
      # instead of a NATS NACK.
      - NATS_MAX_PAYLOAD_BYTES=262144
      # bot-msg-handler already bootstraps BOT_MESSAGES_CANONICAL; this
      # deployment's bootstrap.go still hardcodes MESSAGES_CANONICAL/PUSH_NOTIFICATION,
      # so bootstrap MUST stay off here to avoid creating/verifying the wrong streams.
      # NOTE: no service currently bootstraps BOT_PUSH_NOTIF (see task-8 report).
      - BOOTSTRAP_STREAMS=false
    volumes:
      - ../../../docker-local/backend.creds:/etc/nats/backend.creds:ro
    networks:
      - chat-local

networks:
  chat-local:
    external: true
