# Local-dev Prometheus config for tools/observability.
# Forward-compatible: add jobs here when more services start exposing /metrics.
#
# Prometheus joins the chat-local network (see docker-compose.yml), so it
# resolves each service by its compose service name. Workers bind /metrics on
# :9090 (METRICS_ADDR); search-service uses SEARCH_METRICS_ADDR=:9090.
global:
  scrape_interval: 5s
  evaluation_interval: 15s

scrape_configs:
  - job_name: cadvisor
    static_configs:
      - targets: ['cadvisor:8080']

  # JetStream stream/consumer metrics from prometheus-nats-exporter (jsz).
  - job_name: nats-jetstream
    static_configs:
      - targets: ['nats-exporter:7777']
  # Services exposing /metrics on :9090. Cache hit/miss/error counters
  # (cache_*_total{cache,tier}) come from six services (notification-worker,
  # broadcast-worker, message-gatekeeper, message-worker, room-worker,
  # history-service); search-service exposes its own search_service_* series.
  - job_name: notification-worker
    static_configs:
      - targets: ['notification-worker:9090']
  - job_name: broadcast-worker
    static_configs:
      - targets: ['broadcast-worker:9090']
  - job_name: message-gatekeeper
    static_configs:
      - targets: ['message-gatekeeper:9090']
  - job_name: message-worker
    static_configs:
      - targets: ['message-worker:9090']
  - job_name: room-worker
    static_configs:
      - targets: ['room-worker:9090']
  - job_name: history-service
    static_configs:
      - targets: ['history-service:9090']
  - job_name: search-service
    static_configs:
      - targets: ['search-service:9090']
