name: broadcast-worker

services:
  valkey:
    image: valkey/valkey:8-alpine
    ports:
      - "6379:6379"
    networks:
      - chat-local

  broadcast-worker:
    build:
      context: ../..
      dockerfile: broadcast-worker/deploy/Dockerfile
    environment:
      - NATS_URL=nats://nats:4222
      - NATS_CREDS_FILE=/etc/nats/backend.creds
      - SITE_ID=site-local
      - MONGO_URI=mongodb://mongodb:27017
      - MONGO_DB=chat
      # In-process user cache. Defaults: 10000 entries, 5m TTL.
      # Set USER_CACHE_SIZE=0 to disable caching.
      - USER_CACHE_SIZE=10000
      - USER_CACHE_TTL=5m
      - VALKEY_ADDR=valkey:6379
      - VALKEY_KEY_GRACE_PERIOD=24h
    volumes:
      - ../../docker-local/backend.creds:/etc/nats/backend.creds:ro
    networks:
      - chat-local

networks:
  chat-local:
    external: true
