name: broadcast-worker

services:
  broadcast-worker:
    build:
      context: ../..
      dockerfile: broadcast-worker/deploy/Dockerfile
    environment:
      - NATS_URL=nats://nats:4222
      - NATS_CREDS_FILE=/etc/nats/backend.creds
      - SITE_ID=site-local
      - MONGO_URI=mongodb://mongodb:27017
      - MONGO_DB=chat
      # In-process user cache (pkg/userstore.Cache, shared with message-gatekeeper
      # and message-worker). Defaults: 10000 entries, 5m TTL.
      - USER_CACHE_SIZE=10000
      - USER_CACHE_TTL=5m
      # Valkey is used for room encryption keys only (when ENCRYPTION_ENABLED=true).
      - VALKEY_ADDRS=valkey:6379
      - VALKEY_KEY_GRACE_PERIOD=24h
      - BOOTSTRAP_STREAMS=true
      - ENCRYPTION_ENABLED=${ENCRYPTION_ENABLED:-false}
    volumes:
      - ../../docker-local/backend.creds:/etc/nats/backend.creds:ro
    networks:
      - chat-local

networks:
  chat-local:
    external: true
