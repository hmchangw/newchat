name: broadcast-worker

services:
  broadcast-worker:
    build:
      context: ../..
      dockerfile: broadcast-worker/deploy/Dockerfile
    environment:
      - OTEL_SERVICE_NAME=broadcast-worker
      - OTEL_EXPORTER_OTLP_ENDPOINT=${OTEL_EXPORTER_OTLP_ENDPOINT:-http://otel-collector:4318}
      - NATS_URL=nats://nats:4222
      - NATS_CREDS_FILE=/etc/nats/backend.creds
      - SITE_ID=site-local
      # Dev-only pprof profiling on the health port (off by default). Flip on
      # stack-wide for a profiling session with `PPROF_ENABLED=true make up`.
      - PPROF_ENABLED=${PPROF_ENABLED:-false}
      - MONGO_URI=mongodb://mongodb:27017
      - MONGO_DB=chat
      # In-process user cache (pkg/userstore.Cache, shared with message-gatekeeper
      # and message-worker). Defaults: 10000 entries, 5m TTL.
      - USER_CACHE_SIZE=10000
      - USER_CACHE_TTL=5m
      # Room keys live in the MongoDB rooms collection (read when ENCRYPTION_ENABLED=true);
      # this grace window keeps a rotated-out previous key valid for decrypt.
      - ROOM_KEY_GRACE_PERIOD=24h
      # Valkey backs the room-meta L2 cache.
      - VALKEY_ADDRS=valkey:6379
      - ROOM_META_L2_TTL=15m
      - BOOTSTRAP_STREAMS=true
      - ENCRYPTION_ENABLED=${ENCRYPTION_ENABLED:-false}
      # Dev-only X-Debug verbose logging. DEBUG_LOG_PAYLOADS gates full
      # request/reply/consumed body capture (pair with the X-Debug-Payload header).
      - DEBUG_LOG_PAYLOADS=${DEBUG_LOG_PAYLOADS:-false}
      - DEBUG_LOG_RATE=${DEBUG_LOG_RATE:-50}
    volumes:
      - ../../docker-local/backend.creds:/etc/nats/backend.creds:ro
    networks:
      - chat-local

networks:
  chat-local:
    external: true
