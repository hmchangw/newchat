name: bot-push-notification-service

services:
  bot-push-notification-service:
    build:
      context: ../../..
      dockerfile: push-notification-service/deploy/bot/Dockerfile
    environment:
      - OTEL_SERVICE_NAME=bot-push-notification-service
      - OTEL_EXPORTER_OTLP_ENDPOINT=${OTEL_EXPORTER_OTLP_ENDPOINT:-http://otel-collector:4318}
      - NATS_URL=nats://nats:4222
      - NATS_CREDS_FILE=/etc/nats/backend.creds
      - SITE_ID=site-local
      # Bot push pipeline: same push-notification-service binary as the user deployment,
      # bound to the bot streams/subjects instead via env.
      - INPUT_STREAM=BOT_PUSH_NOTIF_site-local
      - INPUT_SUBJECT_FILTER=chat.bot.notification.push.site-local.>
      - CONSUMER_NAME=bot-push-notification-service
      # Dev-only pprof profiling on the health port (off by default). Flip on
      # stack-wide for a profiling session with `PPROF_ENABLED=true make up`.
      - PPROF_ENABLED=${PPROF_ENABLED:-false}
      # push-notification-service has no bootstrap.go (never creates streams); set for parity
      # with other bot deployments and to document that BOT_PUSH_NOTIF is
      # ops/IaC-owned, not push-notification-service-owned (see task-8 report).
      - BOOTSTRAP_STREAMS=false
    volumes:
      - ../../../docker-local/backend.creds:/etc/nats/backend.creds:ro
    networks:
      - chat-local

networks:
  chat-local:
    external: true
