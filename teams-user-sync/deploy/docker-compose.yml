name: teams-user-sync

# One invocation = one sync run. In production this image is triggered by a
# Kubernetes CronJob (schedule + concurrencyPolicy: Forbid are owned by
# ops/IaC); this compose file runs a single ad-hoc sync against local deps.
services:
  teams-user-sync:
    build:
      context: ../..
      dockerfile: teams-user-sync/deploy/Dockerfile
    restart: "no"
    environment:
      - GRAPH_TENANT_ID=${GRAPH_TENANT_ID}
      - GRAPH_CLIENT_ID=${GRAPH_CLIENT_ID}
      - GRAPH_CLIENT_SECRET=${GRAPH_CLIENT_SECRET}
      - GRAPH_PAGE_SIZE=500
      # Local dev points both lanes at the same MongoDB; production may split
      # them across a read replica and a primary.
      - MONGO_READ_URI=mongodb://mongodb:27017
      - MONGO_READ_DB=chat
      - MONGO_WRITE_URI=mongodb://mongodb:27017
      - MONGO_WRITE_DB=chat
    networks:
      - chat-local

networks:
  chat-local:
    external: true
