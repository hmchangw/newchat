name: admin-frontend

services:
  admin-frontend:
    build:
      context: ../..
      dockerfile: admin-frontend/deploy/Dockerfile
    environment:
      PORTAL_URL: ${PORTAL_URL:-http://localhost:8085}
      ADMIN_SERVICE_URL: ${ADMIN_SERVICE_URL:-http://localhost:8082}
    ports:
      - "3001:80"
    networks:
      - chat-local

networks:
  chat-local:
    external: true
