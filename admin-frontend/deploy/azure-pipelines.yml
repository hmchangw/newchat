trigger:
  branches:
    include:
      - main
      - develop
  paths:
    include:
      - admin-frontend/

pr:
  branches:
    include:
      - main
  paths:
    include:
      - admin-frontend/

variables:
  NODE_VERSION: '22.x'
  SERVICE_NAME: admin-frontend
  REGISTRY: '$(containerRegistry)'

stages:
  - stage: Validate
    displayName: 'Lint & Test'
    jobs:
      - job: LintAndTest
        pool:
          vmImage: 'ubuntu-latest'
        steps:
          - task: NodeTool@0
            inputs:
              versionSpec: '$(NODE_VERSION)'
            displayName: 'Install Node $(NODE_VERSION)'

          - script: npm ci
            workingDirectory: $(SERVICE_NAME)
            displayName: 'Install dependencies'

          - script: npm run typecheck
            workingDirectory: $(SERVICE_NAME)
            displayName: 'Typecheck'

          - script: npx vitest run
            workingDirectory: $(SERVICE_NAME)
            displayName: 'Test $(SERVICE_NAME)'

          - script: npm run build
            workingDirectory: $(SERVICE_NAME)
            displayName: 'Build $(SERVICE_NAME)'

  - stage: Build
    displayName: 'Build & Push Image'
    dependsOn: Validate
    condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
    jobs:
      - job: BuildImage
        pool:
          vmImage: 'ubuntu-latest'
        steps:
          - task: Docker@2
            inputs:
              containerRegistry: '$(containerRegistry)'
              repository: 'chat/$(SERVICE_NAME)'
              command: 'buildAndPush'
              Dockerfile: '$(SERVICE_NAME)/deploy/Dockerfile'
              buildContext: '.'
              tags: |
                $(Build.BuildId)
                latest
            displayName: 'Build & push $(SERVICE_NAME)'
